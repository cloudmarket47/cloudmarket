
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>eCommerce Sales Page Design</title>
    </head>

    <body>
      <form name="product-order" data-netlify="true" hidden>
        <input type="hidden" name="form-name" value="product-order" />
        <input type="text" name="order_number" />
        <input type="text" name="created_at" />
        <input type="text" name="locale_country_code" />
        <input type="text" name="product_id" />
        <input type="text" name="product_slug" />
        <input type="text" name="product_name" />
        <input type="text" name="customer_name" />
        <input type="text" name="customer_phone" />
        <input type="text" name="customer_address" />
        <input type="text" name="city" />
        <input type="text" name="quantity" />
        <input type="text" name="package_title" />
        <input type="text" name="package_description" />
        <input type="text" name="package_label" />
        <input type="text" name="sets_included" />
        <input type="text" name="short_delivery_message" />
        <input type="text" name="customer_token" />
        <input type="text" name="base_amount" />
        <input type="text" name="discount_percentage" />
        <input type="text" name="discount_amount" />
        <input type="text" name="final_amount" />
      </form>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
